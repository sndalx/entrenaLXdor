<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>entrenaLXdor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #222;
            --accent: #e63946;
            --accent-dim: #e6394622;
            --text: #e8e8e8;
            --text-muted: #777;
            --text-dim: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -60%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            letter-spacing: 0.08em;
            position: relative;
        }

        .logo span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 0.95rem;
            margin-top: 0.4rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .content {
            width: 100%;
            max-width: 700px;
            padding: 2rem 1.5rem 4rem;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            padding-left: 0.25rem;
        }

        .file-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .file-item {
            background: var(--surface);
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #1a1a1a;
        }

        .file-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.25rem;
            text-decoration: none;
            color: var(--text);
        }

        .file-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: var(--accent-dim);
            border: 1px solid #e6394633;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .file-arrow {
            color: var(--text-dim);
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .file-item:hover .file-arrow {
            color: var(--accent);
            transform: translateX(3px);
        }

        .loading, .error {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .error { color: var(--accent); }

        .loading-dot {
            display: inline-block;
            animation: pulse 1.2s infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-item {
            animation: fadeIn 0.3s ease both;
        }

        .footer {
            margin-top: auto;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .footer a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">entrena<span>LX</span>dor</div>
        <div class="subtitle">Programa de recuperación y entrenamiento</div>
    </div>

    <div class="content">
        <div class="section-label">Contenidos</div>
        <div id="app">
            <div class="loading">
                Cargando<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://github.com/sndalx/entrenaLXdor" target="_blank">sndalx/entrenaLXdor</a>
    </div>

    <script>
        const REPO = 'sndalx/entrenaLXdor';
        const API  = `https://api.github.com/repos/${REPO}/contents/`;
        const app  = document.getElementById('app');

        function formatName(filename) {
            return filename
                .replace(/\.html$/, '')
                .replace(/_/g, ' ')
                .replace(/^\d+\s*/, m => m.trim() + '. ');
        }

        function getIndex(filename) {
            const match = filename.match(/^(\d+)/);
            return match ? match[1].padStart(2, '0') : '—';
        }

        async function loadFiles() {
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const files = await res.json();

                const htmlFiles = files
                    .filter(f => f.name.endsWith('.html') && f.name !== 'index.html')
                    .sort((a, b) => a.name.localeCompare(b.name));

                if (htmlFiles.length === 0) {
                    app.innerHTML = '<div class="loading">No hay contenidos disponibles aún.</div>';
                    return;
                }

                const ul = document.createElement('ul');
                ul.className = 'file-list';

                htmlFiles.forEach((file, i) => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.style.animationDelay = `${i * 0.06}s`;

                    li.innerHTML = `
                        <a class="file-link" href="${file.name}">
                            <div class="file-icon">${getIndex(file.name)}</div>
                            <div class="file-info">
                                <div class="file-name">${formatName(file.name)}</div>
                                <div class="file-meta">HTML · ${(file.size / 1024).toFixed(0)} KB</div>
                            </div>
                            <svg class="file-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </a>`;

                    ul.appendChild(li);
                });

                app.innerHTML = '';
                app.appendChild(ul);

            } catch (err) {
                app.innerHTML = `<div class="error">Error cargando contenidos: ${err.message}</div>`;
            }
        }

        loadFiles();
    </script>
</body>
</html>
