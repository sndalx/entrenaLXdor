<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sábado 11/04 — Traslado del viernes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #232733;
    --border: #2e3345;
    --text: #e4e6ef;
    --text-dim: #8b8fa3;
    --accent: #818cf8;
    --exercise: #f59e0b;
    --rest: #10b981;
    --warmup: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  body { min-height: 100dvh; }
  #app { width: 100vw; height: 100dvh; display: flex; flex-direction: column; }

  /* Screens */
  .screen { flex: 1; display: flex; flex-direction: column; padding: 20px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Progress bar */
  .progress-bar { width: 100%; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .progress-bar .fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 8px; padding: 0 2px; }
  .progress-pct { color: var(--text-dim); }
  .progress-eta { color: var(--text-dim); }

  /* Block indicator */
  .block-indicator { padding: 8px 4px 10px; border-bottom: 1px solid #232733; margin-bottom: 16px; }
  .block-name { font-size: 11px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
  .block-progress { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

  /* Phase / name */
  .phase { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; text-align: center; }
  .name { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 12px; line-height: 1.2; }
  .intro-title { font-size: 30px; font-weight: 700; text-align: center; margin-bottom: 16px; }

  /* Detail box */
  .instruction-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: var(--text-dim); font-size: 15px; line-height: 1.5; max-width: 400px; width: 100%; margin: 0 auto 16px; }
  .instruction-box p { margin-bottom: 8px; }
  .instruction-box p:last-child { margin-bottom: 0; }
  .key { background: var(--surface-2); color: var(--exercise); padding: 3px 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; display: inline-block; }
  .key.warn { color: var(--warmup); }
  .key.rest { color: var(--rest); }

  /* Detalle visible permanente durante ejecución */
  .exercise-detail { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text-dim); font-size: 13px; line-height: 1.45; max-width: 420px; width: 100%; margin: 0 auto 12px; max-height: 28vh; overflow-y: auto; }
  .exercise-detail p { margin-bottom: 6px; }
  .exercise-detail p:last-child { margin-bottom: 0; }

  /* Timer ring */
  .timer-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-ring { position: relative; width: 220px; height: 220px; margin: 8px auto; }
  .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .timer-ring .bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .timer-ring .progress { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-ring.warmup .progress { stroke: var(--warmup); }
  .timer-ring.exercise .progress { stroke: var(--exercise); }
  .timer-ring.rest .progress { stroke: var(--rest); }
  .timer-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-seconds { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 700; color: var(--text); }
  .timer-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

  /* Reps display */
  .reps-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .reps-number { font-family: 'JetBrains Mono', monospace; font-size: 110px; font-weight: 700; color: var(--exercise); line-height: 1; }
  .reps-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
  .tempo-badge { background: var(--surface-2); color: var(--exercise); padding: 6px 14px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; margin-top: 10px; }
  .per-side { color: var(--exercise); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

  /* Rest screen next */
  .rest-next { margin-top: 12px; font-size: 13px; color: var(--text-dim); text-align: center; padding: 0 20px; }
  .rest-next strong { color: var(--rest); }

  /* Buttons */
  .btn-row { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 12px 0 4px; }
  .btn { padding: 16px 48px; border: none; border-radius: 12px; font-family: 'DM Sans'; font-size: 16px; font-weight: 600; cursor: pointer; touch-action: manipulation; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; min-width: 220px; }
  .btn-done { background: var(--rest); color: #fff; width: 100%; max-width: 320px; padding: 20px; }
  .btn-skip { background: transparent; color: var(--text-dim); border: 1px solid var(--border); font-size: 14px; padding: 12px 32px; }
  .btn-continue { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); font-size: 15px; padding: 14px 36px; }

  /* Intro */
  .intro-banner { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--warmup); border-radius: 10px; padding: 14px 16px; margin: 0 auto 16px; max-width: 420px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .intro-banner strong { color: var(--warmup); font-weight: 600; }
  .intro-list { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin: 0 auto 16px; max-width: 420px; font-size: 13px; color: var(--text-dim); line-height: 1.7; }
  .intro-list .no { color: var(--warmup); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  /* Info screen */
  .info-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; }
  .info-icon-big { font-size: 40px; color: var(--warmup); }
  .info-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .info-body { max-width: 360px; font-size: 15px; color: var(--text-dim); line-height: 1.5; padding: 0 20px; }

  /* Transition screen */
  .transition-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; }
  .transition-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
  .transition-block { font-size: 24px; font-weight: 700; color: var(--accent); padding: 0 20px; }
  .transition-count { font-family: 'JetBrains Mono', monospace; font-size: 80px; font-weight: 700; color: var(--text); line-height: 1; margin-top: 12px; }

  /* Finish */
  .finish-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; }
  .finish-title { font-size: 28px; font-weight: 700; text-align: center; }
  .finish-stats { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; max-width: 360px; width: 100%; }
  .finish-stats .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; color: var(--text-dim); }
  .finish-stats .row strong { color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .finish-next { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--rest); border-radius: 10px; padding: 14px 16px; max-width: 360px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .finish-next strong { color: var(--rest); }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =========================================================
   WORKOUT — Sábado 11/04/2026 (traslado del viernes, lluvia)
   ========================================================= */
const WORKOUT = [
  { type:'intro', name:'Sesión Sábado 11/04', subtitle:'Traslado del viernes', prepTime:0 },

  /* ---------- BLOQUE 1 · Calentamiento dinámico ---------- */
  { type:'exercise-reps', phase:'Calentamiento', name:'Sentadillas al aire', reps:12, prepTime:12, block:'Calentamiento dinámico',
    detail:'Sin carga. De pie, pies a la anchura de caderas o ligeramente más separados, puntas ligeramente hacia fuera. Baja controlado hasta que los muslos estén paralelos al suelo (o hasta donde llegues con talones apoyados). Rodillas alineadas con la dirección de los pies, NO dejes que caigan hacia dentro. Peso distribuido entre mediopié y talones. Columna neutra, mirada al frente. Sube con energía empujando desde los talones. Ombligo hacia dentro durante todo el movimiento. Sin tempo forzado — objetivo: elevar temperatura intramuscular y lubricar cadera/rodilla. 12 repeticiones.' },

  { type:'exercise-reps', phase:'Calentamiento', name:'Rotaciones de cadera', reps:8, prepTime:5, perSide:true, block:'Calentamiento dinámico',
    detail:'De pie, pies anchos a la anchura de hombros, manos en las caderas. Dibuja círculos amplios con la cadera manteniendo el torso y las piernas relativamente fijos — el movimiento viene de la pelvis. Movimiento controlado, sin rebotes. Respiración normal. 8 repeticiones en cada dirección: primero sentido horario, luego antihorario. Activa musculatura profunda y moviliza la articulación coxofemoral.' },

  { type:'exercise-reps', phase:'Calentamiento', name:'Rotaciones tobillo izquierdo', reps:10, prepTime:5, block:'Calentamiento dinámico',
    detail:'Apoyado en pared o con mano en superficie estable, levanta el pie izquierdo y rota el tobillo. El movimiento debe venir desde la articulación del tobillo, NO desde el dedo gordo trazando círculos en el aire. 10 repeticiones en sentido horario + 10 en antihorario. Lado menos rígido, menor prioridad.' },

  { type:'exercise-reps', phase:'Calentamiento', name:'Rotaciones tobillo derecho', reps:12, prepTime:5, block:'Calentamiento dinámico',
    detail:'Mismo gesto con el pie derecho. 12 repeticiones en cada dirección (más que el izquierdo porque es el lado rígido y prioritario por asimetría de dorsiflexión documentada el 08/04/2026). Calidad del movimiento por encima de velocidad. Rango máximo cómodo sin forzar. El objetivo es recuperar amplitud de movimiento, no acelerar.' },

  { type:'exercise-reps', phase:'Calentamiento', name:'Elevación de talones suave', reps:8, prepTime:5, block:'Calentamiento dinámico',
    detail:'De pie, pies a la anchura de caderas, peso distribuido uniformemente. Sube a puntillas controladamente hasta el tope de la elevación y baja igual de controlado hasta apoyar el talón. Sin rebotes. Peso repartido entre los 5 dedos del pie, no solo en el dedo gordo o el meñique. 8 repeticiones bilaterales suaves, sin carga añadida. ⚠ AVISO CRÍTICO: episodio de aquiles bilateral activo (apertura 11/04). Si aparece CUALQUIER sensación en el tendón de Aquiles durante el movimiento (palpitación, tirantez, molestia), SALTA este ejercicio inmediatamente pulsando el botón de saltar. No negocies con el aquiles en fase aguda.' },

  /* ---------- BLOQUE 2 · Tendinoso · Tren inferior ---------- */
  { type:'exercise-timed', phase:'Wall sit · Set 1 de 3', name:'Wall sit', duration:30, prepTime:10, block:'Tendinoso · Tren inferior',
    detail:'Sin carga (bloque de adaptación, semanas 1-4). Apoya la espalda completamente contra la pared: zona lumbar, dorsal y cabeza en contacto. Baja deslizándote hasta que las rodillas queden a 60-70° de flexión (la cadera NO más baja que las rodillas). Pies a la anchura de caderas, separados de la pared lo suficiente para que las tibias queden verticales. Peso en los talones y mediopié, no en las puntas. Ombligo hacia dentro, abdomen activo. Mirada al frente. Respiración activa, NO contengas el aire. ⚠ Si aparece dolor rotuliano, sube ligeramente el ángulo (posición más alta). 30 segundos.' },
  { type:'rest', duration:60, next:'Wall sit · Set 2' },
  { type:'exercise-timed', phase:'Wall sit · Set 2 de 3', name:'Wall sit', duration:35, prepTime:8, block:'Tendinoso · Tren inferior',
    detail:'Mismo setup que el set 1: espalda pegada a la pared, rodillas 60-70°, pies a la anchura de caderas. 35 segundos. Las rodillas deben seguir alineadas con la dirección de los pies — NO dejes que caigan hacia dentro (valgo), señal de debilidad del vasto interno o glúteo medio. Si la fatiga empuja las rodillas hacia dentro, sal del ejercicio antes del tiempo total.' },
  { type:'rest', duration:60, next:'Wall sit · Set 3' },
  { type:'exercise-timed', phase:'Wall sit · Set 3 de 3', name:'Wall sit', duration:40, prepTime:8, block:'Tendinoso · Tren inferior',
    detail:'Último set. 40 segundos. Mismo setup. Este es el set más exigente: mantén la respiración estable (nunca contenida), el ombligo hacia dentro y las rodillas alineadas. Si a los 30 segundos empiezas a temblar, es señal esperable (estabilización neuromuscular en déficit, ver §Conceptos fisiológicos del proyecto). El temblor no es motivo de parada si no hay dolor articular.' },

  { type:'info', title:'Gemelo isométrico — OMITIDO', icon:'⚠',
    body:'Gemelo isométrico en escalón SUSPENDIDO hoy por episodio de aquiles bilateral activo (apertura 11/04). Reincorporación condicional a resolución del episodio. Se pasa directo al puente de glúteo.' },

  { type:'exercise-reps', phase:'Puente glúteo · Set 1 de 3', name:'Puente de glúteo con pausa', reps:10, prepTime:10, block:'Tendinoso · Tren inferior',
    detail:'Tumbado boca arriba sobre superficie firme. Rodillas flexionadas a 90°, pies apoyados planos en el suelo a la anchura de caderas, talones cerca de los glúteos. Brazos extendidos a los lados, palmas hacia abajo. Omóplatos en contacto con el suelo. Barbilla ligeramente metida (NO hiperextensión cervical). Sube la cadera empujando desde los talones y apretando glúteos hasta formar una línea recta hombros-cadera-rodillas (NO sobreextiendas arqueando la lumbar). Mantén 5 segundos arriba con glúteo activo máximo. Baja controlado en 2 segundos. Espalda neutra todo el tiempo: si sientes la lumbar protagonista, re-activa el glúteo. 10 repeticiones.' },
  { type:'rest', duration:60, next:'Puente glúteo · Set 2' },
  { type:'exercise-reps', phase:'Puente glúteo · Set 2 de 3', name:'Puente de glúteo con pausa', reps:10, prepTime:8, block:'Tendinoso · Tren inferior',
    detail:'Mismo setup. 10 repeticiones con pausa isométrica de 5 segundos en el tope de cada una. Foco: la pausa arriba es donde pasa el trabajo tendinoso — glúteo apretado al máximo durante esos 5 segundos. Si la pausa se siente corta, la estás haciendo bien; si se siente fácil, aprieta más fuerte.' },
  { type:'rest', duration:60, next:'Puente glúteo · Set 3' },
  { type:'exercise-reps', phase:'Puente glúteo · Set 3 de 3', name:'Puente de glúteo con pausa', reps:10, prepTime:8, block:'Tendinoso · Tren inferior',
    detail:'Último set del bloque tendinoso inferior. 10 repeticiones con pausa 5s arriba. Control especial en la fase excéntrica (bajada): baja en 2-3 segundos, NO dejes caer. La bajada controlada es la que estimula la adaptación tendinosa. Termina con el glúteo notablemente fatigado — eso es la señal de que el estímulo fue adecuado.' },

  /* ---------- BLOQUE 3 · Tendinoso · Tren superior ---------- */
  { type:'exercise-timed', phase:'Rotación externa · Set 1 de 3', name:'Rotación externa hombro con banda', duration:30, prepTime:12, block:'Tendinoso · Tren superior',
    detail:'Material: banda de 5 kg (la ligera). De pie, codo del brazo a trabajar pegado al costado y flexionado a 90°, como si sostuvieras una revista bajo la axila. Banda anclada en el lado contrario, sujeta con la mano a la altura del ombligo, con tensión inicial mantenida hacia el centro del cuerpo. Mantén el codo totalmente fijo al costado y rota el antebrazo hacia fuera hasta sentir resistencia firme. Posición isométrica 30 segundos. Hombros relajados lejos de las orejas. NO compenses con trapecio superior. Hombro izquierdo asintomático en evaluación matutina: rango completo sin modificación. Respiración activa, sin contener.' },
  { type:'rest', duration:45, next:'Rotación externa · Set 2' },
  { type:'exercise-timed', phase:'Rotación externa · Set 2 de 3', name:'Rotación externa hombro con banda', duration:30, prepTime:8, block:'Tendinoso · Tren superior',
    detail:'Material: banda de 5 kg. Mismo setup que el set 1. Codo anclado al costado inamovible durante 30 segundos. Antebrazo rotado hacia fuera manteniendo tensión constante. Si el codo se separa del costado, recoloca y reinicia el tiempo mental. Hombros bajos, trapecio relajado.' },
  { type:'rest', duration:45, next:'Rotación externa · Set 3' },
  { type:'exercise-timed', phase:'Rotación externa · Set 3 de 3', name:'Rotación externa hombro con banda', duration:30, prepTime:8, block:'Tendinoso · Tren superior',
    detail:'Material: banda de 5 kg. Último set. 30 segundos isométrico. Si la banda afloja durante el set, no compenses rotando el hombro o empujando con el cuerpo — recoloca y mantén la postura. Calidad del isométrico > tiempo total.' },

  { type:'exercise-reps', phase:'Retracción escapular · Set 1 de 3', name:'Retracción escapular en barra', reps:10, prepTime:12, block:'Tendinoso · Tren superior',
    detail:'Material: barra de dominadas de puerta. Agárrate a la barra con agarre neutro o prono (como prefieras), separación anchura de hombros. Cuelga de la barra con brazos COMPLETAMENTE extendidos, pies sin tocar el suelo (o ligeramente apoyados si hace falta). Posición de partida: hombros elevados hacia las orejas (hundidos en la articulación). Activa la espalda alta retrayendo y deprimiendo las escápulas — el cuerpo sube ligeramente como consecuencia, SIN flexionar los codos en ningún momento. Mantén la posición con escápulas retraídas 3 segundos, visualizando que intentas meter los omóplatos en los bolsillos traseros. Suelta controladamente a la posición de partida y repite. ⚠ CRÍTICO: ESTO NO ES UN DEAD HANG. Los dead hangs están SUSPENDIDOS hasta el 15/04/2026 por protocolo de reincorporación del episodio de hombro izquierdo (cerrado 09/04). La diferencia: en el dead hang cuelgas pasivo; aquí el objetivo es activar escápulas. Si notas que estás colgando sin activar espalda, re-activa o para. 10 repeticiones con pausa 3s arriba.' },
  { type:'rest', duration:60, next:'Retracción escapular · Set 2' },
  { type:'exercise-reps', phase:'Retracción escapular · Set 2 de 3', name:'Retracción escapular en barra', reps:10, prepTime:8, block:'Tendinoso · Tren superior',
    detail:'Material: barra de dominadas de puerta. Mismo gesto. Codos COMPLETAMENTE rectos todo el tiempo — si los codos se doblan, es una dominada negativa y estás saltando protocolo (progresión de dominadas no empieza hasta semana 9 según calendario fijo del proyecto). Si aparece fatiga de agarre antes de los 10 reps, suelta y reinicia. 10 repeticiones con pausa 3s.' },
  { type:'rest', duration:60, next:'Retracción escapular · Set 3' },
  { type:'exercise-reps', phase:'Retracción escapular · Set 3 de 3', name:'Retracción escapular en barra', reps:10, prepTime:8, block:'Tendinoso · Tren superior',
    detail:'Material: barra de dominadas de puerta. Último set del bloque superior. 10 repeticiones con pausa 3s. Si pierdes la activación escapular (la sensación de omóplatos retraídos) en cualquier rep, suelta y reinicia esa repetición desde la posición colgada completa. Calidad > cantidad.' },

  { type:'exercise-timed', phase:'Flexión isométrica · Set 1 de 3', name:'Flexión isométrica en pared', duration:30, prepTime:10, block:'Tendinoso · Tren superior',
    detail:'De pie frente a una pared, a una distancia tal que al inclinarte hacia ella las manos queden a la altura del pecho con los codos a ~45° de flexión. Apoya las manos planas en la pared separadas a la anchura de hombros. Pies juntos o ligeramente separados, empeine del pie anclado al suelo. Inclínate hacia la pared hasta que los codos formen los 45° y el cuerpo quede en línea recta desde los tobillos hasta la cabeza (sin arqueo lumbar, sin hundimiento de cadera). Abdomen activo, glúteos ligeramente apretados, mirada al frente. Mantén la posición isométrica 30 segundos activando pectoral, tríceps y core simultáneamente. Respiración normal.' },
  { type:'rest', duration:45, next:'Flexión isométrica · Set 2' },
  { type:'exercise-timed', phase:'Flexión isométrica · Set 2 de 3', name:'Flexión isométrica en pared', duration:30, prepTime:6, block:'Tendinoso · Tren superior',
    detail:'Mismo setup contra la pared. 30 segundos isométrico. El cuerpo debe mantenerse rígido como una tabla: si la cadera empieza a hundirse, re-activa abdomen y glúteo o sal del ejercicio antes del tiempo total. Hombros lejos de las orejas.' },
  { type:'rest', duration:45, next:'Flexión isométrica · Set 3' },
  { type:'exercise-timed', phase:'Flexión isométrica · Set 3 de 3', name:'Flexión isométrica en pared', duration:30, prepTime:6, block:'Tendinoso · Tren superior',
    detail:'Último set del bloque superior. 30 segundos. Mismo setup y cues. Si a los 20 segundos la cadera se hunde, sal antes — la calidad del isométrico es más importante que completar los 30 segundos con mala técnica.' },

  /* ---------- BLOQUE 4 · Bandas ---------- */
  { type:'exercise-reps', phase:'Face pulls · Set 1 de 3', name:'Face pulls con banda', reps:12, prepTime:12, block:'Bandas',
    detail:'Material: banda de 15 kg (la pesada). Banda anclada a la altura de la cara (marco de puerta alto o punto fijo). Agarra cada extremo con una mano, palmas mirándose. Da un paso atrás hasta sentir tensión inicial. Tira hacia la cara separando las manos en el final del recorrido, como abriendo una cremallera. Codos ALTOS, a la altura de los hombros o por encima. Aprieta omóplatos al final del recorrido sintiendo el trapecio medio y los posteriores del deltoides. Pulgares hacia atrás en el tope. 12 repeticiones controladas. ⚠ Hombro izquierdo recién cerrado (07/04 → 09/04): si aparece cualquier sensación en el hombro, PARA inmediatamente. No compenses con lumbar.' },
  { type:'rest', duration:45, next:'Face pulls · Set 2' },
  { type:'exercise-reps', phase:'Face pulls · Set 2 de 3', name:'Face pulls con banda', reps:12, prepTime:6, block:'Bandas',
    detail:'Material: banda de 15 kg. Mismo gesto. Mantén los codos altos durante TODO el recorrido, sobre todo en la concéntrica. Si los codos caen, el trabajo se desplaza a bíceps/dorsal y pierde el estímulo del trapecio medio. 12 reps. Respiración: exhala al tirar.' },

/* =========================================================
   AUDIO
   ========================================================= */
function initAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} } }
function beep(freq, duration, volume = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.type = 'sine';
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration);
}
function shortBeep() { beep(880, 0.1); }
function longBeep()  { beep(660, 0.3); }
function doneBeep()  { beep(1100, 0.15); setTimeout(() => beep(1320, 0.2), 100); }

/* =========================================================
   WAKE LOCK
   ========================================================= */
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (err) { console.log('Wake lock failed:', err.message); }
  }
}
function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && sessionStart && !wakeLock) { requestWakeLock(); }
});

/* =========================================================
   PROGRESS
   ========================================================= */
function isRealExercise(step) { return step && (step.type === 'exercise-reps' || step.type === 'exercise-timed' || step.type === 'warmup-intro'); }
function getTotalSteps() { return WORKOUT.filter(isRealExercise).length; }
function getCompletedSteps() {
  let n = 0;
  for (let i = 0; i < currentStep; i++) if (isRealExercise(WORKOUT[i])) n++;
  return n;
}
function progressPercent() { return Math.round((getCompletedSteps() / getTotalSteps()) * 100); }

/* ETA — hora estimada de finalización */
function parseTempoSeconds(tempo) {
  const parts = tempo.split('-').map(Number);
  const sum = parts.reduce((a, b) => a + b, 0);
  return sum || 3;
}
function estimateRepsTime(step) {
  const perRep = step.tempo ? parseTempoSeconds(step.tempo) : 3;
  const reps = step.reps || 10;
  const multiplier = step.perSide ? 2 : 1;
  return perRep * reps * multiplier;
}
function estimateRemainingSeconds() {
  let sec = 0;
  for (let i = currentStep; i < WORKOUT.length; i++) {
    const s = WORKOUT[i];
    if (s.prepTime) sec += s.prepTime;
    if (s.type === 'exercise-timed' || s.type === 'warmup-intro') sec += s.duration || 0;
    else if (s.type === 'exercise-reps') sec += estimateRepsTime(s);
    else if (s.type === 'rest') sec += s.duration || 0;
    else if (s.type === 'info') sec += 10;
    const next = WORKOUT[i + 1];
    if (next && s.block && next.block && s.block !== next.block) sec += 3;
  }
  return sec;
}
function formatETA(remainingSec) {
  const end = new Date(Date.now() + remainingSec * 1000);
  return end.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', hour12: false });
}

/* Intra-block progress: Ejercicio X de Y · Set A de B (simplificado: solo ejercicio n/n del bloque) */
function getBlockProgress(step) {
  if (!step || !step.block) return '';
  // Count exercises in the same block up to and including current
  const block = step.block;
  let total = 0, pos = 0;
  WORKOUT.forEach((s, i) => {
    if (s.block === block && isRealExercise(s)) {
      total++;
      if (i <= currentStep) pos++;
    }
  });
  if (total === 0) return '';
  return `Ejercicio ${pos} de ${total}`;
}

/* =========================================================
   RENDER DISPATCHER
   ========================================================= */
function render() {
  const step = WORKOUT[currentStep];
  if (!step) return;

  // Transition check: block change between consecutive exercises
  if (step.block && lastBlockShown && step.block !== lastBlockShown && transitionShownFor !== currentStep) {
    transitionShownFor = currentStep;
    renderTransition(step.block);
    return;
  }
  if (step.block) lastBlockShown = step.block;

  switch (step.type) {
    case 'intro':          renderIntro(step); break;
    case 'exercise-reps':  renderPrep(step, () => renderExerciseReps(step)); break;
    case 'exercise-timed': renderPrep(step, () => renderExerciseTimed(step)); break;
    case 'rest':           renderRest(step); break;
    case 'info':           renderInfo(step); break;
    case 'finish':         renderFinish(); break;
  }
}

function advance() { currentStep++; render(); }

    blockBlock = `<div class="block-indicator"><div class="block-name">${step.block}</div><div class="block-progress">${getBlockProgress(step)}</div></div>`;
  }
  return `<div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
    <div class="progress-meta"><span class="progress-pct">${pct}%</span><span class="progress-eta">≈ ${eta}</span></div>

}

/* =========================================================
   TIMER
   ========================================================= */
function startCountdown(seconds, secEl, ringEl, circumference, onDone) {
  clearInterval(timerInterval);
  timerStart = Date.now();
  timerDuration = seconds;
  let beeped = {3:false, 2:false, 1:false};
  const sec = document.getElementById(secEl);
  const ring = document.getElementById(ringEl);
  if (ring) ring.style.strokeDashoffset = 0;
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - timerStart) / 1000;
    const remaining = Math.max(0, seconds - elapsed);
    const display = Math.ceil(remaining);
    if (sec) sec.textContent = display;
    if (ring) {
      const pct = remaining / seconds;
      ring.style.strokeDashoffset = circumference * (1 - pct);
    }
    if (display === 3 && !beeped[3]) { beeped[3] = true; shortBeep(); }
    if (display === 2 && !beeped[2]) { beeped[2] = true; shortBeep(); }
    if (display === 1 && !beeped[1]) { beeped[1] = true; shortBeep(); }
    if (remaining <= 0) { clearInterval(timerInterval); onDone(); }
  }, 100);
}

/* =========================================================
   SESSION LIFECYCLE
   ========================================================= */
function startSession() {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  sessionStart = Date.now();
  requestWakeLock();
  if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(()=>{}); }
  currentStep = 1;
  render();
}
window.startSession = startSession;
window.advance = advance;

/* Boot */
render();
</script>
